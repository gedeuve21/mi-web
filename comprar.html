    <main class="contenedor">
        <header>
            <h1> Catálogo de Cartas</h1>
            <p> Selecciona las cartas que quieras añadir a tu colección. </p>
        </header>

        <section class="opciones-grid">
            <div class="card-item">
                <img src="img/carta1.jpg" alt="Carta Pokemon" style="width: 100%; border-radius: 10px;">
                <h3> Charizard Base Set </h3>
                <p>Precio: 450,00 € </p>
                <button class="btn-pokemon" onclick="agregarAlCarrito('Charizard' , 450)">Añadir</button>
            </div> 

            <div class="info-carta">
                <h4>Charizard Holo</h4>
                <p>Base Set</p>
                <span class="precio">450,00 €</span>
                <button class="btn-comprar" data-nombre="Charizard Holo" data-precio="450">Comprar</button>
            </div>
        </main>
